services:
  db:
    image: postgres:latest
    container_name: jinseiroku-db
    environment:
      POSTGRES_USER: sachin
      POSTGRES_PASSWORD: root
      POSTGRES_DB: life
    ports:
      - "5431:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - jinseiroku-network
  
  minio:
    image: minio/minio:latest
    container_name: jinseiroku-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin123456
    ports:
      - "9000:9000" 
      - "9001:9001" 
    volumes:
      - minio_data:/data
    networks:
      - jinseiroku-network

  backend:
    build: ./backend
    container_name: jenseiroku-backend
    ports:
      - "9090:9090"
    




